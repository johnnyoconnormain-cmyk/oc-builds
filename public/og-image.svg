<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a1a"/>
  <!-- Subtle noise texture dots -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#noise)" opacity="0.03"/>
  <!-- Orange accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#FF6B2B"/>
  <!-- Glow -->
  <ellipse cx="200" cy="315" rx="300" ry="300" fill="#FF6B2B" opacity="0.05"/>

  <!-- Logo mark -->
  <rect x="80" y="210" width="52" height="52" rx="8" fill="#FF6B2B"/>
  <rect x="80" y="272" width="52" height="30" rx="8" fill="#FF6B2B" opacity="0.45"/>
  <rect x="104" y="190" width="52" height="30" rx="8" fill="#FF6B2B" opacity="0.45"/>
  <rect x="104" y="228" width="52" height="52" rx="8" fill="#FF6B2B" opacity="0.7"/>

  <!-- OC wordmark -->
  <text x="174" y="255" font-family="Arial Black, sans-serif" font-weight="900" font-size="58" fill="white" letter-spacing="-2">OC</text>
  <text x="174" y="285" font-family="Arial, sans-serif" font-weight="600" font-size="22" fill="rgba(255,255,255,0.4)" letter-spacing="8">BUILDS</text>

  <!-- Divider -->
  <rect x="80" y="330" width="480" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Headline -->
  <text x="80" y="395" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="white" letter-spacing="-1">Websites for small</text>
  <text x="80" y="455" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FF6B2B" letter-spacing="-1">businesses that work.</text>

  <!-- Sub -->
  <text x="80" y="510" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.45)">Ellensburg, WA · ocbuilds.com</text>
</svg>
